name: ⚡ PWA & Performance Audit

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP Web Server
        run: |
          php -S localhost:8000 &
          sleep 3

      - name: Audit URL using Lighthouse
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: 'http://localhost:8000/index.php'
          uploadArtifacts: false # FIX: Kita matikan ini sebab ia bugged
          temporaryPublicStorage: true
          budgetPath: .github/lighthouse-budget.json

      # FIX: Kita upload report secara manual guna action rasmi
      - name: Upload Lighthouse Report
        uses: actions/upload-artifact@v4
        if: always() # Upload walaupun audit fail
        with:
          name: lighthouse-report
          path: .lighthouseci/
