name: 🪄 Auto-Fix PHP Code Style

on:
  workflow_dispatch: # Kita set supaya boleh run manual (tekan butang)

permissions:
  contents: write # Wajib: Bagi kebenaran untuk edit fail dalam repo

jobs:
  php-code-beautifier:
    name: 💅 Polish Code
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup PHP Tools
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: phpcbf # Kita install tool pembaiki (bukan penyemak)

      - name: Run Auto-Fixer (PHPCBF)
        # Command ini sama macam phpcs, tapi dia tukar jadi phpcbf
        # "|| true" ditambah supaya workflow tak berhenti walaupun ada error
        run: phpcbf --standard=PSR12 --extensions=php --ignore=*/vendor/*,*/testing/* . || true

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: 🎨 Auto-fix PHP code style to PSR-12"
          branch: ${{ github.head_ref }}
