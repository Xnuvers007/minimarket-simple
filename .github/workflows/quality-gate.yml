name: 🛡️ Code Quality & Security Gate

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  matrix-compatibility:
    name: 🧪 Test PHP ${{ matrix.php-versions }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-versions: ['7.4', '8.0', '8.1', '8.2']
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: mbstring, intl, pdo, pdo_mysql
          coverage: none

      - name: Check Syntax Error
        run: find . -name "*.php" ! -path "./vendor/*" -print0 | xargs -0 -n1 php -l

  static-analysis:
    name: 🔍 Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP & Tools
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: phpstan, phpcs
          
      - name: Run PHP CodeSniffer (PSR-12)
        continue-on-error: true
        run: phpcs --standard=PSR12 --extensions=php --ignore=*/vendor/*,*/testing/* .
        
      # FIX: Command ini sekarang lebih pendek & mengikut standard config file
      - name: Run PHPStan
        run: phpstan analyse --memory-limit=1G
